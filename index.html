<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Portal</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f7f7f7, #ececec);
      color: #222;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border-radius: 18px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      text-align: center;
      margin: 0 0 10px;
      font-size: 32px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 35px;
      font-size: 15px;
    }

    .section {
      margin-top: 35px;
    }

    .section h2 {
      margin-bottom: 18px;
      font-size: 22px;
      padding-bottom: 8px;
      border-bottom: 2px solid #f0f0f0;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .project-card {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 90px;
      padding: 18px;
      border-radius: 14px;
      text-decoration: none;
      color: #222;
      background: #f9f9f9;
      border: 1px solid #e2e2e2;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      transition: all 0.2s ease;
    }

    .project-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
      background: #f1f1f1;
    }

    .project-card.disabled {
      pointer-events: none;
      color: #999;
      background: #fafafa;
      border: 1px dashed #d6d6d6;
      font-weight: 500;
    }

    @media (max-width: 600px) {
      .container {
        padding: 25px;
      }

      h1 {
        font-size: 26px;
      }

      .section h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Project Portal</h1>
    <p class="subtitle">Select a project below to open its form or website.</p>

    <div class="section">
      <h2>BC</h2>
      <div class="card-grid">
        <a
          class="project-card"
          href="https://www.jotform.com/app/260065339350251?utm_source=jotform_pwa"
          target="_blank"
          rel="noopener noreferrer"
        >
          Duncan
        </a>

        <a class="project-card disabled" href="#">Campbell River</a>
        <a class="project-card disabled" href="#">Sooke</a>
      </div>
    </div>

    <div class="section">
      <h2>AB</h2>
      <div class="card-grid">
        <a
          class="project-card"
          href="https://app.jotform.com/242045453762253?utm_source=share-qr&utm_medium=website&utm_campaign=portal-app&utm_term=242045453762253"
          target="_blank"
          rel="noopener noreferrer"
        >
          Township
        </a>

        <a class="project-card disabled" href="#">Township Phase 2</a>

        <a
          class="project-card"
          href="https://www.jotform.com/app/241275419100245?utm_source=share-qr&utm_medium=website&utm_campaign=portal-app&utm_term=241275419100245"
          target="_blank"
          rel="noopener noreferrer"
        >
          North Hill Phase 2
        </a>

        <a class="project-card disabled" href="#">Sherwood Park</a>
      </div>
    </div>
  </div>
</body>
</html>
